<nav class="navbar">
  <a class="navbar-brand" [routerLink]="getBrandLink()">
    <span>🚗</span>
    <span class="brand-text">EmergVial</span>
  </a>

  <div class="navbar-links" *ngIf="usuario">
    <a
      *ngFor="let item of menuItems"
      [routerLink]="item.path"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.exact ?? false }">
      {{ item.label }}
    </a>
  </div>

  <div class="navbar-user" *ngIf="usuario">
    <div class="user-info">
      <div class="avatar">{{ usuario.nombre.charAt(0) }}</div>

      <div class="user-details">
        <span class="user-name">{{ usuario.nombre }}</span>
        <span class="user-rol" [ngClass]="'rol-' + usuario.id_rol">
          {{ usuario.nombre_rol }}
        </span>
      </div>
    </div>

    <button class="logout-btn" (click)="logout()">Salir</button>
  </div>
</nav>
