<div class="registro-wrapper">
  <div class="registro-card card">
    <div class="header">
      <span class="logo">🚗</span>
      <h2>Crear Cuenta</h2>
      <p>Registrate como administrador de taller</p>
    </div>

    <div *ngIf="error" class="alert alert-error">{{ error }}</div>
    <div *ngIf="success" class="alert alert-success">{{ success }}</div>

    <div class="form-grid">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="form.nombre" placeholder="Tu nombre" />
      </div>
      <div class="form-group">
        <label>Apellido</label>
        <input type="text" [(ngModel)]="form.apellido" placeholder="Tu apellido" />
      </div>
    </div>
    <div class = "form-group">
        <label>CI</label>
        <input type="text" [(ngModel)]="form.codigo" placeholder="Tu CI" />
    </div>

    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" [(ngModel)]="form.email" placeholder="correo@ejemplo.com" />
    </div>

    <div class="form-group">
      <label>Teléfono</label>
      <input type="text" [(ngModel)]="form.telefono" placeholder="+591 7XXXXXXX" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="form.password" placeholder="Mínimo 8 caracteres" />
    </div>

    <button class="btn-primary" (click)="onRegistro()" [disabled]="loading">
      {{ loading ? 'Registrando...' : 'Crear Cuenta' }}
    </button>

    <p class="login-link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </div>
</div>
